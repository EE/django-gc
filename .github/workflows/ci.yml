name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13', '3.14']
        django-version: ['5.2', '6.0']
        exclude:
          # Django 5.2 supports Python <= 3.13
          - python-version: '3.14'
            django-version: '5.2'
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[test]' 'django~=${{ matrix.django-version }}.0'
      - run: pytest
